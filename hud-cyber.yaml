name: zaia-hud
label: Zaia HUD
description: "Zaia's signature command center \u2014 deep indigo, electric cyan, amber\
  \ alerts; cockpit layout with sidebar telemetry rail"
palette:
  background:
    hex: '#070a12'
    alpha: 1.0
  midground:
    hex: '#c0ddff'
    alpha: 1.0
  foreground:
    hex: '#f0f6ff'
    alpha: 0
  warmGlow: rgba(249, 115, 22, 0.22)
  noiseOpacity: 0.55
typography:
  fontSans: '"Orbitron", "Eurostile", "Bank Gothic", system-ui, sans-serif'
  fontMono: '"Share Tech Mono", "JetBrains Mono", "SF Mono", ui-monospace, monospace'
  fontDisplay: '"Orbitron", "Eurostile", Impact, sans-serif'
  fontUrl: https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Share+Tech+Mono&display=swap
  baseSize: 14px
  lineHeight: '1.52'
  letterSpacing: 0.035em
layout:
  radius: 0px
  density: compact
layoutVariant: cockpit
assets:
  bg: 'linear-gradient(155deg, #070a12 0%, #0d1525 45%, #152535 100%)'
  hero: radial-gradient(ellipse at 70% 20%, rgba(63, 211, 255, 0.06) 0%, transparent
    60%)
  crest: ''
componentStyles:
  card:
    clipPath: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%,
      0 100%, 0 8px)
    background: linear-gradient(180deg, rgba(12, 22, 44, 0.9) 0%, rgba(7, 10, 18,
      0.92) 100%)
    boxShadow: inset 0 0 0 1px rgba(63, 211, 255, 0.20), 0 0 24px -10px rgba(63, 211,
      255, 0.25)
    border: 1px solid rgba(63, 211, 255, 0.12)
  header:
    background: linear-gradient(180deg, rgba(18, 32, 64, 0.95) 0%, rgba(7, 10, 18,
      0.9) 100%)
    borderBottom: 1px solid rgba(63, 211, 255, 0.15)
  sidebar:
    background: linear-gradient(180deg, rgba(10, 18, 38, 0.9) 0%, rgba(7, 10, 18,
      0.85) 100%)
  tab:
    clipPath: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%)
  badge:
    textTransform: uppercase
    letterSpacing: 0.1em
    fontSize: 0.6rem
    fontWeight: 700
    borderRadius: 0px
  backdrop:
    fillerOpacity: 1
    fillerBlendMode: normal
colorOverrides:
  primary: '#3fd3ff'
  primaryForeground: '#070a12'
  accent: '#ffce3a'
  accentForeground: '#070a12'
  ring: '#3fd3ff'
  success: '#22c55e'
  warning: '#ffce3a'
  destructive: '#ef4444'
  border: rgba(63, 211, 255, 0.18)
  card: rgba(12, 22, 44, 0.85)
  cardForeground: '#e6f1ff'
  muted: rgba(18, 32, 64, 0.55)
  mutedForeground: '#7a9cbf'
customCSS: "\n/* Grid background \u2014 subtle tech-grain */\n:root[data-layout-variant=\"\
  cockpit\"] body::before {\n  content: \"\";\n  position: fixed;\n  inset: 0;\n \
  \ pointer-events: none;\n  z-index: -1;\n  background-image: \n    linear-gradient(rgba(63,\
  \ 211, 255, 0.025) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(63, 211,\
  \ 255, 0.025) 1px, transparent 1px);\n  background-size: 48px 48px;\n  mix-blend-mode:\
  \ screen;\n}\n\n/* Radial ambient glow behind content */\n:root[data-layout-variant=\"\
  cockpit\"] body::after {\n  content: \"\";\n  position: fixed;\n  inset: 0;\n  pointer-events:\
  \ none;\n  z-index: -1;\n  background: radial-gradient(ellipse 80% 50% at 50% 0%,\
  \ rgba(63, 211, 255, 0.05) 0%, transparent 70%);\n  mix-blend-mode: screen;\n}\n\
  \n/* Corner brackets \u2014 thin, precise */\n:root[data-layout-variant=\"cockpit\"\
  ] [data-slot=\"card\"] {\n  position: relative;\n  transition: border-color 0.2s;\n\
  }\n:root[data-layout-variant=\"cockpit\"] [data-slot=\"card\"]::before,\n:root[data-layout-variant=\"\
  cockpit\"] [data-slot=\"card\"]::after {\n  content: \"\";\n  position: absolute;\n\
  \  width: 10px;\n  height: 10px;\n  border: 1px solid rgba(63, 211, 255, 0.25);\n\
  \  pointer-events: none;\n  transition: border-color 0.2s;\n}\n:root[data-layout-variant=\"\
  cockpit\"] [data-slot=\"card\"]:hover::before,\n:root[data-layout-variant=\"cockpit\"\
  ] [data-slot=\"card\"]:hover::after {\n  border-color: rgba(63, 211, 255, 0.5);\n\
  }\n:root[data-layout-variant=\"cockpit\"] [data-slot=\"card\"]::before {\n  top:\
  \ -1px; left: -1px;\n  border-right: none; border-bottom: none;\n}\n:root[data-layout-variant=\"\
  cockpit\"] [data-slot=\"card\"]::after {\n  bottom: -1px; right: -1px;\n  border-left:\
  \ none; border-top: none;\n}\n\n/* Header glow */\n:root[data-layout-variant=\"\
  cockpit\"] header {\n  box-shadow: 0 2px 20px -5px rgba(63, 211, 255, 0.08);\n}\n\
  \n/* Tab indicator \u2014 glowing underline */\n:root[data-layout-variant=\"cockpit\"\
  ] [data-slot=\"tab-list\"] {\n  position: relative;\n}\n:root[data-layout-variant=\"\
  cockpit\"] [data-slot=\"tab-list\"]::after {\n  content: \"\";\n  position: absolute;\n\
  \  bottom: -1px;\n  left: 0;\n  right: 0;\n  height: 1px;\n  background: linear-gradient(90deg,\
  \ transparent, rgba(63, 211, 255, 0.3), transparent);\n}\n\n/* Button hover glow\
  \ */\n:root[data-layout-variant=\"cockpit\"] button:hover {\n  box-shadow: 0 0 14px\
  \ rgba(63, 211, 255, 0.25);\n}\n\n/* Scanline \u2014 very subtle */\n:root[data-layout-variant=\"\
  cockpit\"] body::backdrop {\n  background: repeating-linear-gradient(\n    to bottom,\n\
  \    transparent 0px,\n    transparent 3px,\n    rgba(63, 211, 255, 0.01) 4px\n\
  \  );\n}\n"
